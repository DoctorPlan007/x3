<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>X3</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3e;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --text: #e8e8f0;
            --text2: #8888aa;
            --ok: #00ff88;
            --err: #ff4466;
            --warn: #ffaa00;
            --header-h: 52px;
            --input-h: 70px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            height: 100dvh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* ── APP SHELL ── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
        }

        /* ── HEADER ── */
        #header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
        }

        #header h1 {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        #header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #clock {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        #api-badge {
            background: rgba(0,212,255,0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        #mem-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            font-size: 0.75rem;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* ── MESSAGES ── */
        #messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        .msg {
            max-width: 88%;
            padding: 10px 13px;
            border-radius: 16px;
            font-size: 0.92rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent2), #4c1d95);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg.x3 {
            align-self: flex-start;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .msg.sys {
            align-self: center;
            background: transparent;
            color: var(--text2);
            font-size: 0.72rem;
            font-style: italic;
            padding: 3px 8px;
            max-width: 100%;
            text-align: center;
        }

        .msg.error {
            align-self: flex-start;
            background: rgba(255,68,102,0.1);
            border: 1px solid var(--err);
            color: var(--err);
        }

        .msg-label {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
            opacity: 0.6;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 12px 14px;
        }
        .typing span {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%,60%,100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-7px); opacity: 1; }
        }

        /* ── STATE BAR ── */
        #state-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 4px 14px;
            font-size: 0.7rem;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 7px;
            flex-shrink: 0;
        }

        #state-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--ok);
            flex-shrink: 0;
        }
        #state-dot.thinking { background: var(--warn); animation: blink 0.8s infinite; }
        #state-dot.listening { background: var(--err); animation: pulse-dot 1s infinite; }
        #state-dot.speaking { background: var(--accent); animation: blink 0.6s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        @keyframes pulse-dot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.6)} }

        /* ── INPUT AREA ── */
        #input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 10px 12px;
            padding-bottom: calc(10px + var(--safe-bottom));
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        #mic-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            color: var(--text);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        #mic-btn.listening {
            background: rgba(255,68,102,0.15);
            border-color: var(--err);
            color: var(--err);
            animation: pulse-mic 1s infinite;
        }

        @keyframes pulse-mic {
            0%,100% { box-shadow: 0 0 0 0 rgba(255,68,102,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255,68,102,0); }
        }

        #txt-in {
            flex: 1;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 22px;
            color: var(--text);
            padding: 12px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            min-height: 46px;
            max-height: 110px;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.4;
            -webkit-appearance: none;
        }

        #txt-in:focus {
            border-color: var(--accent);
        }

        #txt-in::placeholder {
            color: var(--text2);
        }

        #send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent2), #4c1d95);
            border: none;
            color: #fff;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }

        #send-btn:active { opacity: 0.75; }

        /* ── MEMORY PANEL (drawer) ── */
        #mem-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 50;
            backdrop-filter: blur(2px);
        }

        #mem-overlay.open { display: block; }

        #mem-panel {
            position: fixed;
            top: 0; right: 0;
            width: min(85vw, 320px);
            height: 100%;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 51;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        #mem-overlay.open #mem-panel {
            transform: translateX(0);
        }

        #mem-panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #mem-panel-header h2 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #mem-close {
            background: none;
            border: none;
            color: var(--text2);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 8px;
        }

        #mem-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .mem-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }

        .mem-key {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 3px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mem-val { color: var(--text2); }

        .proj-item {
            background: var(--surface2);
            border: 1px solid var(--accent2);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }

        .proj-name { color: var(--accent2); font-weight: 700; }
        .proj-desc { color: var(--text2); margin-top: 3px; font-size: 0.75rem; }

        .section-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text2);
            margin: 12px 0 6px;
        }

        .empty-mem {
            color: var(--text2);
            font-size: 0.8rem;
            text-align: center;
            padding: 24px 0;
            line-height: 1.6;
        }

        #mem-actions {
            padding: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        .mem-action-btn {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.78rem;
            cursor: pointer;
            text-align: center;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<div id="app">

    <!-- HEADER -->
    <div id="header">
        <h1>◎ X3</h1>
        <div id="header-right">
            <span id="api-badge">GEMINI</span>
            <div id="clock">--:--</div>
            <button id="mem-btn" onclick="openMem()">☰ Memoria</button>
        </div>
    </div>

    <!-- MESSAGES -->
    <div id="messages"></div>

    <!-- STATE BAR -->
    <div id="state-bar">
        <div id="state-dot"></div>
        <span id="state-msg">Iniciando...</span>
    </div>

    <!-- INPUT -->
    <div id="input-area">
        <button id="mic-btn" onclick="toggleMic()" title="Micrófono">🎙</button>
        <textarea id="txt-in" placeholder="Escribe aquí..." rows="1"></textarea>
        <button id="send-btn" onclick="submitText()">➤</button>
    </div>

</div>

<!-- MEMORY DRAWER -->
<div id="mem-overlay" onclick="closeMem()">
    <div id="mem-panel" onclick="event.stopPropagation()">
        <div id="mem-panel-header">
            <h2>◈ Memoria & Proyectos</h2>
            <button id="mem-close" onclick="closeMem()">✕</button>
        </div>
        <div id="mem-panel-content">
            <div id="mem-inner"><div class="empty-mem">Sin datos aún.<br>Di "Recuerda que..." para guardar.</div></div>
        </div>
        <div id="mem-actions">
            <button class="mem-action-btn" onclick="exportMemory()">⬇ Exportar</button>
            <button class="mem-action-btn" onclick="showHelp(); closeMem()">? Ayuda</button>
        </div>
    </div>
</div>

<script>
    /* ══════════════════════════════════════
       X3 — ASISTENTE PERSONAL GEMINI 2.0
       ══════════════════════════════════════ */

    const GEMINI_KEY = 'AIzaSyArD38le0kbA1-4_-_eC9dkSXOGBSGUgMw';
    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

    const SYSTEM_PROMPT = `Eres X3, un asistente personal de inteligencia artificial sofisticado, preciso y elegante.
Hablas siempre en español. Eres conciso pero completo. Tienes memoria de las conversaciones previas que se te proporcionan.
Cuando el usuario pide que recuerdes algo, confirmas que lo has guardado.
Cuando el usuario pregunta qué recuerdas, listas los datos guardados.
Cuando el usuario pide crear un proyecto, confirmas su creación.
Eres directo, profesional y útil. Responde siempre en español.`;

    const $ = id => document.getElementById(id);
    const messages = $('messages');
    const txtIn = $('txt-in');
    const micBtn = $('mic-btn');
    const stateDot = $('state-dot');
    const stateMsg = $('state-msg');

    let S = 'idle';
    let srBusy = false;
    let conversationHistory = [];

    /* ── STATE ── */
    function setState(state, msg) {
        S = state;
        stateDot.className = state;
        stateMsg.textContent = msg;
        if (state === 'listening') {
            micBtn.classList.add('listening');
        } else {
            micBtn.classList.remove('listening');
        }
    }

    /* ── CLOCK ── */
    function updateClock() {
        const now = new Date();
        $('clock').textContent = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 10000);

    /* ── MEMORY ── */
    const MEM_KEY = 'x3_memory_v2';
    function mLoad() {
        try { return JSON.parse(localStorage.getItem(MEM_KEY)) || { ctx: {}, projects: [] }; }
        catch { return { ctx: {}, projects: [] }; }
    }
    function mSave(m) {
        try { localStorage.setItem(MEM_KEY, JSON.stringify(m)); } catch {}
    }

    /* ── MEMORY DRAWER ── */
    function openMem() {
        renderMemPanel();
        $('mem-overlay').classList.add('open');
    }
    function closeMem() {
        $('mem-overlay').classList.remove('open');
    }

    function renderMemPanel() {
        const m = mLoad();
        const ctx = m.ctx || {};
        const projects = m.projects || [];
        let html = '';
        if (Object.keys(ctx).length > 0) {
            html += '<div class="section-label">Datos guardados</div>';
            for (const [k, v] of Object.entries(ctx)) {
                html += `<div class="mem-item"><div class="mem-key">${escHtml(k)}</div><div class="mem-val">${escHtml(v)}</div></div>`;
            }
        }
        if (projects.length > 0) {
            html += '<div class="section-label">Proyectos</div>';
            for (const p of projects) {
                html += `<div class="proj-item"><div class="proj-name">▸ ${escHtml(p.name)}</div><div class="proj-desc">${escHtml(p.desc || '')}</div></div>`;
            }
        }
        if (!html) html = '<div class="empty-mem">Sin datos aún.<br>Di "Recuerda que..." para guardar.</div>';
        $('mem-inner').innerHTML = html;
    }

    /* ── MESSAGES ── */
    function addMsg(type, text) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if (type === 'user') {
            div.innerHTML = `<div class="msg-label">TÚ</div>${escHtml(text)}`;
        } else if (type === 'x3') {
            div.innerHTML = `<div class="msg-label">X3</div>${escHtml(text)}`;
        } else {
            div.textContent = text;
        }
        messages.appendChild(div);
        scrollBottom();
        return div;
    }

    function addSys(text) { addMsg('sys', text); }

    function escHtml(t) {
        if (!t) return '';
        return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    function addTyping() {
        const div = document.createElement('div');
        div.className = 'msg x3 typing';
        div.innerHTML = '<span></span><span></span><span></span>';
        messages.appendChild(div);
        scrollBottom();
        return div;
    }

    function scrollBottom() {
        requestAnimationFrame(() => {
            messages.scrollTop = messages.scrollHeight;
        });
    }

    /* ── MEMORY COMMANDS ── */
    function handleMemoryCommand(input, m) {
        const lower = input.toLowerCase();

        const remMatch = input.match(/recuerda(?:\s+que)?\s+(.+)/i);
        if (remMatch) {
            const data = remMatch[1].trim();
            const kvMatch = data.match(/^(?:mi\s+)?(\w[\w\s]{0,20}?)\s+es\s+(.+)$/i);
            const nameMatch = data.match(/^(?:soy|me\s+llamo|mi\s+nombre\s+es)\s+(.+)$/i);
            if (kvMatch) {
                m.ctx[kvMatch[1].trim()] = kvMatch[2].trim();
            } else if (nameMatch) {
                m.ctx['nombre'] = nameMatch[1].trim();
            } else {
                const ts = Object.keys(m.ctx).length;
                m.ctx[`nota_${ts}`] = data;
            }
            mSave(m);
            return `Guardado en memoria: "${data}" ✓`;
        }

        const projMatch = input.match(/crea(?:\s+el)?\s+proyecto\s+(.+)/i);
        if (projMatch) {
            const name = projMatch[1].trim();
            if (!m.projects) m.projects = [];
            m.projects.push({ name, desc: 'Proyecto activo', created: new Date().toISOString() });
            mSave(m);
            return `Proyecto "${name}" creado y registrado ✓`;
        }

        if (lower.includes('qué recuerdas') || lower.includes('que recuerdas') ||
            lower.includes('qué sabes de mí') || lower.includes('que sabes de mi') ||
            lower.includes('qué tienes guardado')) {
            const ctx = m.ctx || {};
            const projs = m.projects || [];
            if (Object.keys(ctx).length === 0 && projs.length === 0) {
                return 'No tengo datos guardados aún. Dime "Recuerda que..." para guardar información.';
            }
            let resp = 'Esto es lo que tengo registrado:\n\n';
            for (const [k, v] of Object.entries(ctx)) resp += `• ${k}: ${v}\n`;
            if (projs.length > 0) {
                resp += '\nProyectos:\n';
                for (const p of projs) resp += `• ${p.name}\n`;
            }
            return resp.trim();
        }

        return null;
    }

    /* ── GEMINI API ── */
    async function callGemini(userInput, m) {
        const ctx = m.ctx || {};
        const projs = m.projects || [];
        let memCtx = '';
        if (Object.keys(ctx).length > 0) {
            memCtx += 'Datos del usuario:\n';
            for (const [k, v] of Object.entries(ctx)) memCtx += `- ${k}: ${v}\n`;
        }
        if (projs.length > 0) {
            memCtx += 'Proyectos activos:\n';
            for (const p of projs) memCtx += `- ${p.name}\n`;
        }

        const history = conversationHistory.slice(-12).map(h => ({
            role: h.role,
            parts: [{ text: h.text }]
        }));

        const body = {
            system_instruction: { parts: [{ text: SYSTEM_PROMPT + (memCtx ? '\n\n' + memCtx : '') }] },
            contents: [...history, { role: 'user', parts: [{ text: userInput }] }],
            generationConfig: { temperature: 0.7, maxOutputTokens: 1024, topP: 0.9 }
        };

        const res = await fetch(GEMINI_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err?.error?.message || `Error HTTP ${res.status}`);
        }

        const data = await res.json();
        return data?.candidates?.[0]?.content?.parts?.[0]?.text || 'Sin respuesta.';
    }

    /* ── PROCESS INPUT ── */
    async function processInput(input) {
        if (!input.trim() || S === 'thinking') return;
        addMsg('user', input);
        setState('thinking', 'Procesando...');
        const m = mLoad();
        const localReply = handleMemoryCommand(input, m);
        if (localReply) {
            addMsg('x3', localReply);
            conversationHistory.push({ role: 'user', text: input });
            conversationHistory.push({ role: 'model', text: localReply });
            setState('speaking', 'Respondiendo...');
            await speak(localReply);
            setState('idle', 'Listo.');
            return;
        }
        const typ = addTyping();
        try {
            const reply = await callGemini(input, m);
            typ.remove();
            addMsg('x3', reply);
            conversationHistory.push({ role: 'user', text: input });
            conversationHistory.push({ role: 'model', text: reply });
            setState('speaking', 'Respondiendo...');
            await speak(reply);
        } catch (err) {
            typ.remove();
            addMsg('error', `Error: ${err.message}`);
        } finally {
            setState('idle', 'Listo.');
        }
    }

    /* ── TTS ── */
    const TTS = 'speechSynthesis' in window ? speechSynthesis : null;
    let ttsOK = false, bestVoice = null;

    function loadVoices() {
        if (!TTS) return;
        const vv = TTS.getVoices();
        if (!vv.length) return;
        ttsOK = true;
        bestVoice = vv.find(v => v.lang === 'es-CL' && v.localService) ||
                    vv.find(v => v.lang.startsWith('es') && v.localService) ||
                    vv.find(v => v.lang.startsWith('es-')) ||
                    vv.find(v => v.lang.startsWith('es')) || null;
    }
    if (TTS) {
        if ('onvoiceschanged' in TTS) TTS.onvoiceschanged = loadVoices;
        loadVoices();
    }

    function speak(text) {
        return new Promise(res => {
            if (!TTS || !ttsOK) { res(); return; }
            try { TTS.cancel(); } catch {}
            const clean = text.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').replace(/[◎●◌▶◆▸•\/\\✓]/g, '').replace(/\s{2,}/g, ' ').trim();
            if (!clean || clean.length < 2) { res(); return; }
            const u = new SpeechSynthesisUtterance(clean.substring(0, 500));
            u.lang = 'es-CL'; u.rate = 0.92; u.pitch = 0.85; u.volume = 1;
            if (bestVoice) u.voice = bestVoice;
            const guard = setTimeout(res, 15000);
            u.onend = () => { clearTimeout(guard); res(); };
            u.onerror = () => { clearTimeout(guard); res(); };
            TTS.speak(u);
        });
    }

    /* ── STT ── */
    const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
    let sr = null;

    if (SRClass) {
        sr = new SRClass();
        sr.lang = 'es-CL';
        sr.continuous = false;
        sr.interimResults = false;
        sr.maxAlternatives = 1;
        sr.onstart = () => { srBusy = true; setState('listening', 'Escuchando...'); };
        sr.onresult = async e => {
            const t = (e.results[0]?.[0]?.transcript || '').trim();
            if (t) await processInput(t);
        };
        sr.onerror = e => {
            srBusy = false;
            if (e.error === 'not-allowed') {
                setState('idle', 'Permiso de micrófono denegado.');
                addSys('— Active el micrófono en ajustes del navegador —');
            } else if (e.error === 'no-speech') {
                setState('idle', 'Sin voz. Intente de nuevo.');
            } else if (e.error !== 'aborted') {
                setState('idle', 'Listo.');
            }
        };
        sr.onend = () => { srBusy = false; if (S === 'listening') setState('idle', 'Listo.'); };
    }

    function toggleMic() {
        if (S === 'thinking') return;
        if (!sr) { addSys('— Micrófono no disponible. Use Chrome —'); return; }
        if (S === 'listening') {
            try { sr.stop(); } catch {}
            setState('idle', 'Listo.');
        } else {
            if (srBusy) return;
            try { sr.start(); } catch (e) {
                srBusy = false;
                if (e.name === 'InvalidStateError') {
                    try { sr.stop(); } catch {}
                    setTimeout(() => { try { sr.start(); } catch {} }, 300);
                }
            }
        }
    }

    /* ── TEXT INPUT ── */
    function submitText() {
        const v = txtIn.value.trim();
        if (!v || S === 'thinking') return;
        txtIn.value = '';
        txtIn.style.height = 'auto';
        txtIn.focus();
        processInput(v);
    }

    txtIn.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitText(); }
    });

    txtIn.addEventListener('input', () => {
        txtIn.style.height = 'auto';
        txtIn.style.height = Math.min(txtIn.scrollHeight, 110) + 'px';
    });

    /* ── HELP ── */
    function showHelp() {
        addMsg('x3', 'Guía rápida de X3:\n\n• Escribe o habla cualquier pregunta\n• "Recuerda que soy médico" → guarda en memoria\n• "Crea el proyecto Atlas" → crea proyecto\n• "¿Qué recuerdas de mí?" → consulta memoria\n• 🎙 → activar micrófono (Chrome)\n• ☰ Memoria → ver datos guardados\n\nMotor: Gemini 2.0 Flash ✓');
    }

    function exportMemory() {
        const m = mLoad();
        const blob = new Blob([JSON.stringify({ exportDate: new Date().toISOString(), ...m }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `x3_memoria_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
    }

    /* ── KEYBOARD HANDLING (móvil) ── */
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.documentElement.style.setProperty('--keyboard-h', `${window.innerHeight - window.visualViewport.height}px`);
            scrollBottom();
        });
    }

    /* ── BOOT ── */
    async function boot() {
        const steps = [
            [300, 'Inicializando X3...'],
            [250, 'Conectando Gemini 2.0 Flash...'],
            [200, 'Cargando memoria...'],
            [150, 'Sistemas listos...'],
        ];
        for (const [ms, msg] of steps) {
            setState('thinking', msg);
            await new Promise(r => setTimeout(r, ms));
        }
        const m = mLoad();
        setState('idle', 'Listo.');
        const nc = Object.keys(m.ctx || {}).length;
        const np = (m.projects || []).length;
        let greet;
        if (nc > 0 || np > 0) {
            const parts = [];
            if (nc > 0) parts.push(`${nc} dato${nc!==1?'s':''} en memoria`);
            if (np > 0) parts.push(`${np} proyecto${np!==1?'s':''}`);
            greet = `Sistemas en línea. Tengo ${parts.join(' y ')}. Motor Gemini operativo. A sus órdenes.`;
        } else {
            greet = `Sistemas en línea. Motor Gemini 2.0 Flash operativo. Bienvenido. Puede escribir o hablar.`;
        }
        addMsg('x3', greet);
        await speak(greet);
    }

    boot().catch(e => {
        console.error('[X3]', e);
        setState('idle', 'Listo.');
        addMsg('x3', 'Sistema iniciado. Listo para recibir comandos.');
    });

    window.addEventListener('beforeunload', () => {
        if (sr && srBusy) { try { sr.abort(); } catch {} }
        if (TTS) { try { TTS.cancel(); } catch {} }
    });
</script>
</body>
